name: Foundry

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      # `forge install` mishandles this nested layout (git root is the repo root,
      # but Foundry's libs are under contracts/), failing with "Library directory
      # is not relative to the repository root". Clone forge-std directly, pinned
      # to the foundry.lock revision (v1.16.1).
      - name: Install forge-std
        run: git clone --branch v1.16.1 --depth 1 https://github.com/foundry-rs/forge-std lib/forge-std

      - name: Check formatting
        run: forge fmt --check

      - name: Build
        run: forge build --force

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/deployer/package-lock.json

      - name: Install deployer app
        run: npm ci
        working-directory: apps/deployer

      - name: Audit deployer app
        run: npm audit --omit=dev
        working-directory: apps/deployer

      - name: Build deployer app
        run: npm run build
        working-directory: apps/deployer

      - name: Test
        run: forge test -vvv

      - name: Contract sizes (EIP-170 guard)
        run: forge build --sizes

      # Coverage is intentionally not run in CI. `forge coverage` must use
      # `--ir-minimum` here (plain coverage disables via_ir and hits Solidity's
      # stack-too-deep), which is slow/noisy. Run it locally instead:
      #   forge coverage --ir-minimum
